name: Lint

on:
  push:
    branches:
      - main
      - main_refactor
  pull_request:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run ESLint
        run: |
          npx eslint . || true

      - name: Type check
        run: |
          npm run -s build || true
